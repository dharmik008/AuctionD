<!-- templates/404.html - Premium 404 Error Page -->
{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="container">
  <div class="empty-state" style="margin: 4rem auto; max-width: 500px;">
    <div class="empty-icon">
      <i class="fas fa-compass" style="font-size: 4rem; color: var(--primary);"></i>
    </div>
    <h3>Page Not Found</h3>
    <p>The page you're looking for doesn't exist or has been moved to our premium collection.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
      <i class="fas fa-home"></i>
      <span>Return Home</span>
    </a>
  </div>
</div>
{% endblock %}
