<!-- templates/500.html - Premium Server Error Page -->
{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="container">
  <div class="empty-state" style="margin: 4rem auto; max-width: 500px;">
    <div class="empty-icon">
      <i class="fas fa-tools" style="font-size: 4rem; color: var(--warning);"></i>
    </div>
    <h3>Something Went Wrong</h3>
    <p>Our team has been notified. Please try again in a few moments.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
      <i class="fas fa-home"></i>
      <span>Return Home</span>
    </a>
  </div>
</div>
{% endblock %}
