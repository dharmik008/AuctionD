<!-- templates/signup.html - Premium Sign Up Page -->
{% extends 'base.html' %}
{% block title %}Create Account — AutoBidCRM{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card animate-fade-up">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <i class="fas fa-gavel"></i>
      </div>
      <h2>AutoBidCRM</h2>
    </div>

    <h3>Create Account</h3>
    <p>Start bidding on premium vehicles</p>

    <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="James Anderson" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="james@example.com" required />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="james_bids" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required />
      </div>

      <div id="signupError" class="error-message hidden"></div>

      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-user-plus"></i>
        <span>Create Account</span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in →</a>
    </p>
  </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;
  const errorDiv = document.getElementById('signupError');
  
  if (password !== confirm) {
    e.preventDefault();
    errorDiv.textContent = 'Passwords do not match';
    errorDiv.classList.remove('hidden');
  } else {
    errorDiv.classList.add('hidden');
  }
});
</script>
{% endblock %}
